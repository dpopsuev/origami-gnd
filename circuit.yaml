# GND Circuit — Gather & Diffuse
#
# Canonical circuit topology owned by the GND schematic. Consumers import
# this base via `import: gnd` and overlay domain-specific additions.
#
# Gathers code context from configured source repositories, then
# synthesizes a cohesive domain artifact via LLM diffusion.
# Designed for composition: any circuit can invoke this as a
# subgraph node via handler_type: circuit.
#
# Pipeline:
#   tree       — ensure repos are available, list file trees
#   search     — search repos for relevant code using context keywords
#   read       — read matched files (token-budgeted)
#   synthesize — diffuse gathered context into cohesive artifact (LLM)
#
# Input context (inherited from parent):
#   dsr.search_keywords — []string of search terms
#   params.sources      — source catalog (set by inject.sources hook)
#
# Output: the "synthesize" node produces a synthesized domain artifact.
# In deterministic mode (no dispatcher), passes through *CodeContext.

circuit: gnd
topology: cascade
handler_type: transformer

nodes:
  - name: tree
    description: "Ensure repos available and list file trees"
    approach: methodical
    handler: dsr.tree

  - name: search
    description: "Search repos for relevant code"
    approach: analytical
    handler: dsr.search

  - name: read
    description: "Read matched source files (token-budgeted)"
    approach: methodical
    handler: dsr.read

  - name: synthesize
    description: "Synthesize gathered code context into cohesive domain artifact"
    approach: creative
    handler: dsr.synthesize

edges:
  - id: tree-search
    name: "Tree to Search"
    from: tree
    to: search

  - id: search-read
    name: "Search to Read"
    from: search
    to: read

  - id: read-synthesize
    name: "Read to Synthesize"
    from: read
    to: synthesize

  - id: synthesize-done
    name: "Synthesize to Done"
    from: synthesize
    to: _done

start: tree
done: _done
